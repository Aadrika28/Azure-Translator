<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Azure Translator App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🌍 Azure Translator</h1>

    <!-- API Config -->
    <div class="config">
      <input type="text" id="apiKey" placeholder="Enter Azure API Key">
      <input type="text" id="region" placeholder="Enter Azure Region (e.g., eastus)">
    </div>

    <!-- Text Input -->
    <textarea id="inputText" placeholder="Enter text to translate..."></textarea>

    <!-- Language Selection -->
    <div class="controls">
      <select id="fromLang">
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
      </select>

      <select id="toLang">
        <option value="fr">French</option>
        <option value="en">English</option>
        <option value="es">Spanish</option>
      </select>
    </div>

    <button onclick="translateText()">Translate</button>

    <!-- Output -->
    <textarea id="outputText" placeholder="Translated text..." readonly></textarea>
  </div>

  <script src="script.js"></script>
</body>
</html>
